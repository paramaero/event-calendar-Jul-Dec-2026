function loadTable(){
const tbody=document.getElementById("calendarBody");
tbody.innerHTML="";

data.forEach((row,i)=>{
let saved=localStorage.getItem("row_"+i) || row.join(" | ");

let tr=document.createElement("tr");

tr.innerHTML = `
<td>${row[0]}</td>
<td>${row[1]}</td>
<td colspan="5">
<textarea onchange="save(${i},this.value)">${saved}</textarea>
</td>
`;

tbody.appendChild(tr);
});

applyMode();
}

function save(i,val){
localStorage.setItem("row_"+i,val);
}

function toggleEdit(){
isEditable=!isEditable;
applyMode();
}

function applyMode(){
document.getElementById("calendarTable")
.classList.toggle("readonly",!isEditable);
}

function clearData(){
localStorage.clear();
loadTable();
}

function downloadHTML(){
let html=document.documentElement.outerHTML;
let blob=new Blob([html],{type:"text/html"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="updated-calendar.html";
a.click();
}

loadTable();

</script>
