<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Planning Calendar</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 20px;
    }
    h2 {
        text-align: center;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
    }
    th {
        background: #0078d4;
        color: white;
    }
    textarea {
        width: 100%;
        height: 60px;
    }
    .controls {
        margin-bottom: 15px;
        text-align: center;
    }
    button {
        margin: 5px;
        padding: 10px 15px;
        border: none;
        background: #0078d4;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #005fa3;
    }
    .readonly textarea {
        background: #f0f0f0;
        pointer-events: none;
    }
</style>
</head>

<body>

<h2>📅 Event Planning Calendar</h2>

<div class="controls">
    <button onclick="toggleEdit()">Toggle Edit/View</button>
    <button onclick="downloadHTML()">Download Updated File</button>
    <button onclick="clearData()">Reset</button>
</div>

<table id="calendarTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Day</th>
            <th>Event / Task</th>
        </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
</table>

<script>
const daysInMonth = 30;
let isEditable = true;

function generateCalendar() {
    const tbody = document.getElementById("calendarBody");
    tbody.innerHTML = "";

    for (let i = 1; i <= daysInMonth; i++) {
        let savedData = localStorage.getItem("day_" + i) || "";

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${i}</td>
            <td>Day ${i}</td>
            <td>
                <textarea onchange="saveData(${i}, this.value)">${savedData}</textarea>
            </td>
        `;
        tbody.appendChild(row);
    }

    applyMode();
}

function saveData(day, value) {
    localStorage.setItem("day_" + day, value);
}

function toggleEdit() {
    isEditable = !isEditable;
    applyMode();
}

function applyMode() {
    const table = document.getElementById("calendarTable");
    if (!isEditable) {
        table.classList.add("readonly");
    } else {
        table.classList.remove("readonly");
    }
}

function clearData() {
    if (confirm("Clear all data?")) {
        localStorage.clear();
        generateCalendar();
    }
}

function downloadHTML() {
    let htmlContent = document.documentElement.outerHTML;

    // Inject current data into HTML
    for (let i = 1; i <= daysInMonth; i++) {
        let value = localStorage.getItem("day_" + i) || "";
        const regex = new RegExp(`<textarea[^>]*>(.*?)</textarea>`);
        htmlContent = htmlContent.replace(regex, `<textarea>${value}</textarea>`);
    }

    const blob = new Blob([htmlContent], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "updated-event-calendar.html";
    a.click();
}

generateCalendar();
</script>

</body>
</html>
